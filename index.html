<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>COQM MUSIC FIXED</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap');
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background: #000; color: #fff; font-family: 'Montserrat', sans-serif; margin: 0; height: 100vh; overflow: hidden; }

        /* ЭФФЕКТЫ НАЖАТИЯ */
        .btn-click:active { transform: scale(0.9); opacity: 0.7; }
        .track-card:active { transform: scale(0.95); background: #1a1a1a; }
        
        /* ЗОНА ПЛЕЕРА */
        #full-player { position: fixed; top: 100%; left: 0; width: 100%; height: 100%; background: #000; transition: 0.5s cubic-bezier(0.1, 0.7, 0.1, 1); z-index: 100; padding: 25px; display: flex; flex-direction: column; }
        #full-player.open { top: 0; }

        /* ГЛАВНАЯ МАГИЯ: УБИРАЕМ КЛЕТКУ */
        .playback-zone { 
            position: relative; width: 80vw; height: 80vw; max-width: 300px; 
            margin: 30px auto; 
        }

        .vinyl-wrapper {
            position: relative; width: 100%; height: 100%;
            border-radius: 50%; /* ДЕЛАЕМ КРУГЛЫМ */
            overflow: hidden; /* ОБРЕЗАЕМ КЛЕТКУ ПО КРАЯМ */
            background: #000 url('vinyl_disc.png') no-repeat center center;
            background-size: 110%; /* НЕМНОГО УВЕЛИЧИВАЕМ, ЧТОБЫ СКРЫТЬ КРАЯ */
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 0 50px rgba(255,255,255,0.05);
            animation: rotate 10s linear infinite;
            animation-play-state: paused;
        }
        .playing .vinyl-wrapper { animation-play-state: running; }

        .vinyl-cover { 
            width: 40%; height: 40%; border-radius: 50%; 
            object-fit: cover; border: 4px solid #000; z-index: 2;
        }

        /* ИГЛА БЕЗ ЛИШНЕГО ФОНА */
        .vinyl-arm-container {
            position: absolute; top: -30px; right: -40px;
            width: 150px; height: 150px;
            pointer-events: none; z-index: 10;
        }

        .vinyl-arm {
            width: 100%; height: auto;
            transform-origin: 80% 20%;
            transform: rotate(25deg);
            transition: transform 0.8s ease;
            /* Пытаемся скрыть фон самой картинки иглы */
            filter: drop-shadow(0 0 0 black); 
            clip-path: inset(0 0 10% 0); /* Немного обрезаем края картинки */
        }
        .playing .vinyl-arm { transform: rotate(5deg); }

        @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        /* ИНТЕРФЕЙС */
        .controls { display: flex; justify-content: space-around; align-items: center; margin-top: 40px; }
        .play-btn { background: #fff; color: #000; width: 75px; height: 75px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 30px; }
        
        .progress-bar { width: 100%; height: 4px; background: #222; border-radius: 2px; margin-top: 30px; position: relative; }
        #progress-fill { position: absolute; height: 100%; background: #fff; width: 0%; border-radius: 2px; }

        /* СПИСОК */
        .screen { padding: 20px; padding-bottom: 120px; height: 100vh; overflow-y: auto; display: none; }
        .screen.active { display: block; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 20px; }
        .track-card { background: #0a0a0a; border-radius: 15px; padding: 10px; border: 1px solid #1a1a1a; }
        .track-card img { width: 100%; border-radius: 10px; margin-bottom: 10px; }

        .mini-player { position: fixed; bottom: 80px; left: 10px; right: 10px; background: #111; padding: 12px; border-radius: 20px; display: flex; align-items: center; border: 1px solid #222; }
    </style>
</head>
<body id="app-body">

    <div id="home" class="screen active">
        <h1 style="text-align:center; font-weight:900; letter-spacing:-2px;">COQM MUSIC</h1>
        <div class="grid" id="track-list"></div>
    </div>

    <div class="mini-player btn-click" onclick="openPlayer()">
        <img src="1000061091.png" style="width:40px; height:40px; border-radius:50%; margin-right:10px;">
        <div style="flex:1"><b>SIRENS</b><br><small style="opacity:0.5">KAI ANGEL</small></div>
        <div id="mini-play">▶</div>
    </div>

    <div id="full-player">
        <div onclick="closePlayer()" style="font-size:30px; opacity:0.5">✕</div>
        
        <div class="playback-zone">
            <div class="vinyl-wrapper">
                <img src="1000061091.png" class="vinyl-cover">
            </div>
            <div class="vinyl-arm-container">
                <img src="vinyl_arm.png" class="vinyl-arm">
            </div>
        </div>

        <div style="text-align:center; margin-top:20px;">
            <h2 id="m-title" style="margin:0; font-weight:900; text-transform:uppercase;">SIRENS</h2>
            <p style="opacity:0.4; margin:5px 0;">KAI ANGEL</p>
        </div>

        <div class="progress-bar"><div id="progress-fill"></div></div>
        
        <div class="controls">
            <div class="btn-click" onclick="prev()" style="font-size:30px">⏮</div>
            <div class="play-btn btn-click" id="main-play" onclick="togglePlay()">▶</div>
            <div class="btn-click" onclick="next()" style="font-size:30px">⏭</div>
        </div>
    </div>

    <audio id="audio"></audio>

    <script>
        const playlist = [
            { title: "SIRENS", src: "https://files.catbox.moe/e6eczs.mp3" },
            { title: "FIRE WALK WITH ME", src: "https://files.catbox.moe/8v7k8t.mp3" },
            { title: "DESIGNERS PARADISE", src: "https://files.catbox.moe/q711k2.mp3" },
            { title: "PARASOCIAL FREESTYLE", src: "https://files.catbox.moe/nlkvvb.mp3" }
        ];

        let idx = 0;
        const audio = document.getElementById('audio');
        const body = document.getElementById('app-body');

        function init() {
            const list = document.getElementById('track-list');
            playlist.forEach((t, i) => {
                const card = document.createElement('div');
                card.className = 'track-card';
                card.onclick = () => { idx = i; load(i); audio.play(); status(true); openPlayer(); };
                card.innerHTML = `<img src="1000061091.png"><div>${t.title}</div>`;
                list.appendChild(card);
            });
        }

        function load(i) {
            audio.src = playlist[i].src;
            document.getElementById('m-title').innerText = playlist[i].title;
        }

        function togglePlay() {
            if(audio.paused) { audio.play(); status(true); } 
            else { audio.pause(); status(false); }
        }

        function status(p) {
            const icon = p ? '❚❚' : '▶';
            document.getElementById('main-play').innerText = icon;
            document.getElementById('mini-play').innerText = icon;
            p ? body.classList.add('playing') : body.classList.remove('playing');
        }

        function next() { idx=(idx+1)%playlist.length; load(idx); audio.play(); status(true); }
        function prev() { idx=(idx-1+playlist.length)%playlist.length; load(idx); audio.play(); status(true); }
        
        function openPlayer() { document.getElementById('full-player').classList.add('open'); }
        function closePlayer() { document.getElementById('full-player').classList.remove('open'); }

        audio.ontimeupdate = () => {
            const p = (audio.currentTime / audio.duration) * 100 || 0;
            document.getElementById('progress-fill').style.width = p + "%";
        };

        init(); load(0);
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CM Music</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            background: linear-gradient(180deg, #1e1e1e 0%, #121212 100%);
            color: white;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 20px;
            min-height: 100vh;
        }
        .header { 
            font-size: 28px; 
            font-weight: 800; 
            margin: 20px 0 30px 0; 
            color: #1DB954; 
            text-align: center;
            letter-spacing: -1px;
        }
        .player-card {
            background: #181818;
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
            transition: transform 0.2s;
        }
        .track-img { 
            width: 100%; 
            aspect-ratio: 1/1; 
            border-radius: 10px; 
            background: #282828; 
            margin-bottom: 15px;
            object-fit: cover;
        }
        .track-name { font-size: 20px; font-weight: bold; margin-bottom: 5px; }
        .artist { color: #b3b3b3; font-size: 15px; margin-bottom: 15px; }
        audio { 
            width: 100%; 
            height: 40px;
            filter: invert(100%) hue-rotate(180deg) brightness(1.5); 
        }
        .footer-btn {
            display: block;
            width: 200px;
            margin: 40px auto;
            background: #1DB954;
            color: black;
            border: none;
            padding: 15px;
            border-radius: 30px;
            font-weight: bold;
            text-align: center;
            text-decoration: none;
            font-size: 16px;
        }
    </style>
</head>
<body>
    <div class="header">CM Music</div>
    
    <div class="player-card">
        <img src="https://via.placeholder.com/300/282828/1DB954?text=CM" class="track-img">
        <div class="track-name">Название песни</div>
        <div class="artist">Исполнитель</div>
        <audio controls>
            <source src="ССЫЛКА_НА_МУЗЫКУ_1.mp3" type="audio/mpeg">
        </audio>
    </div>

    <div class="player-card">
        <img src="https://via.placeholder.com/300/282828/1DB954?text=CM" class="track-img">
        <div class="track-name">Второй трек</div>
        <div class="artist">Исполнитель</div>
        <audio controls>
            <source src="ССЫЛКА_НА_МУЗЫКУ_2.mp3" type="audio/mpeg">
        </audio>
    </div>

    <button class="footer-btn" onclick="window.Telegram.WebApp.close()">Закрыть плеер</button>

    <script>
        window.Telegram.WebApp.expand();
    </script>
</body>
</html>

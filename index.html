<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kai Angel - Are You Happy?</title>
    <style>
        body { background: linear-gradient(180deg, #1a0b1a 0%, #000000 100%); color: #fff0f5; font-family: sans-serif; padding: 20px; text-align: center; min-height: 100vh; margin: 0; }
        .header { font-size: 20px; font-weight: bold; color: #e1b1ff; margin-bottom: 20px; text-shadow: 0 0 15px rgba(225, 177, 255, 0.4); letter-spacing: 2px; }
        .track-img { width: 250px; height: 250px; border-radius: 15px; object-fit: cover; border: 1px solid #4a2d4d; margin-bottom: 15px; box-shadow: 0 0 30px rgba(160, 100, 200, 0.2); }
        .lyrics-container { height: 220px; overflow-y: hidden; margin: 20px 0; font-size: 17px; line-height: 1.8; mask-image: linear-gradient(transparent, black 25%, black 75%, transparent); }
        .lyrics-line { opacity: 0.2; transition: 0.4s; color: #d8bfd8; }
        .lyrics-line.active { opacity: 1; color: #e1b1ff; transform: scale(1.05); font-weight: bold; }
        audio { width: 100%; filter: invert(80%) sepia(50%) saturate(1000%) hue-rotate(240deg); margin-top: 15px; border-radius: 30px; }
        .dev-panel { background: rgba(225, 177, 255, 0.05); padding: 15px; border-radius: 20px; border: 1px dashed #4a2d4d; margin-top: 30px; }
        button { background: #e1b1ff; color: #1a0b1a; border: none; padding: 12px 20px; border-radius: 12px; font-weight: bold; cursor: pointer; margin: 5px; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        #log { background: #000; color: #e1b1ff; font-family: monospace; font-size: 10px; padding: 15px; text-align: left; margin-top: 15px; white-space: pre-wrap; display: none; border: 1px solid #4a2d4d; }
    </style>
</head>
<body>
    <div class="header">CM MUSIC • VIPERR</div>
    <img src="https://files.catbox.moe/p9pghz.jpg" class="track-img">
    <div style="font-weight: bold; font-size: 22px; color: #e1b1ff;">Are You Happy?</div>
    <div style="opacity: 0.5; font-size: 14px; margin-bottom: 10px;">Kai Angel</div>

    <div class="lyrics-container" id="lrc-list"></div>
    <audio id="audio-player" controls></audio>

    <div class="dev-panel">
        <p style="font-size: 11px; text-transform: uppercase;">Синхронизация текста:</p>
        <button onclick="markTime()">🎵 МЕТКА ВРЕМЕНИ</button>
        <button onclick="showResult()">СКОПИРОВАТЬ ТАЙМИНГИ</button>
        <div id="log"></div>
    </div>

    <script>
        const audio = document.getElementById('audio-player');
        const lrcList = document.getElementById('lrc-list');
        const log = document.getElementById('log');

        const rawLyrics = [
            "Are you happy? (Are you happy?)", "‘Cause you look sad", "Like a church with no choir", "Like a God gone mad", "Like a God gone mad on the edge of the night",
            "I don’t see your smile", "Your voice just doesn’t land", "I’m familiar with your desire", "And it’s very different than what’s in your hands",
            "Hold me like a secret", "But scream in my ear", "Tell me you love me", "Then disappear", "I don’t want the truth", "I just want a touch", "Bleed me slow", "But don’t ask for it too much", "Bleed me slow, wow",
            "Окей, держи меня в секрете", "И не рассказывай никому в интернете", "Ты в моих снах буквально каждый день", "I still see your eyes through the rain", "I still feel your scent like a subtle stain", "You leave ghosts in midnight air", "It’s still on my mind how you",
            "Hold me like a secret", "But scream in my ear", "Tell me you love me", "Then disappear", "I don’t want the truth", "I just want a touch", "Bleed me slow", "But don’t ask for it too much",
            "Baby, I love every surgery you did", "If I was a knife, I would stab somewhere in between", "Maybe I’m not the one to hold you like this", "But you", "Hold me like a secret",
            "You scream in my ear", "Tell me you love me (Do you love me?)", "Then disappear", "I don’t want the truth", "I just want a touch", "But don’t ask for it too much",
            "But scream in my ear", "Tell me you love me", "Then disappear", "I don’t want the truth", "I just want a touch", "Bleed me slow", "But don’t ask for it too much"
        ];

        let syncData = [];
        let currentLine = 0;

        // Вставь свою ссылку на mp3 сюда:
        audio.src = "https://files.catbox.moe/w92z79.mp3"; 

        rawLyrics.forEach((text, i) => {
            const div = document.createElement('div');
            div.className = 'lyrics-line';
            div.id = `line-${i}`;
            div.innerText = text;
            lrcList.appendChild(div);
        });

        function markTime() {
            const time = Math.floor(audio.currentTime);
            if (currentLine < rawLyrics.length) {
                syncData.push(`[${time}, "${rawLyrics[currentLine]}"]`);
                document.querySelectorAll('.lyrics-line').forEach(el => el.classList.remove('active'));
                const activeLine = document.getElementById(`line-${currentLine}`);
                activeLine.classList.add('active');
                activeLine.scrollIntoView({ behavior: 'smooth', block: 'center' });
                currentLine++;
            }
        }

        function showResult() {
            log.style.display = 'block';
            log.innerText = "lyrics: [\n  " + syncData.join(",\n  ") + "\n]";
        }
    </script>
</body>
</html>

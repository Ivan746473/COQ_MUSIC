<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>COQM Premium</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap');
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background: #000; color: #fff; font-family: 'Montserrat', sans-serif; margin: 0; height: 100vh; overflow: hidden; }

        .screen { display: none; height: 100vh; padding: 20px; padding-bottom: 150px; overflow-y: auto; }
        .screen.active { display: block; }
        h2 { font-size: 24px; margin-top: 40px; color: #e1b1ff; font-weight: 700; }

        /* Навигация */
        .nav { position: fixed; bottom: 0; width: 100%; background: #050505; display: flex; justify-content: space-around; padding: 12px 0; border-top: 1px solid #1a1a1a; z-index: 50; }
        .nav-item { text-align: center; color: #555; font-size: 10px; font-weight: 600; cursor: pointer; }
        .nav-item.active { color: #e1b1ff; }
        .nav-icon { font-size: 24px; display: block; margin-bottom: 4px; }

        /* Сетка на главной */
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 20px; }
        .track-card { background: #111; border-radius: 12px; padding: 10px; border: 1px solid #222; text-align: center; transition: 0.2s; }
        .track-card:active { transform: scale(0.95); background: #1a1a1a; }
        .track-card img { width: 100%; border-radius: 8px; margin-bottom: 8px; aspect-ratio: 1/1; object-fit: cover; }
        .track-card div { font-size: 12px; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        /* Полный плеер */
        #full-player { position: fixed; top: 100%; left: 0; width: 100%; height: 100%; background: linear-gradient(180deg, #1e1124 0%, #000 100%); transition: 0.5s cubic-bezier(0.4, 0, 0.2, 1); z-index: 100; padding: 20px 25px; display: flex; flex-direction: column; }
        #full-player.open { top: 0; }
        
        .header-player { display: flex; justify-content: space-between; align-items: center; width: 100%; padding-top: 10px; }
        .back-btn { color: #e1b1ff; font-size: 35px; cursor: pointer; transform: rotate(90deg); font-weight: bold; }

        .content-area { flex-grow: 1; display: flex; align-items: center; justify-content: center; width: 100%; margin: 20px 0; position: relative; }
        .full-img { width: 85vw; height: 85vw; max-width: 320px; border-radius: 24px; object-fit: cover; box-shadow: 0 15px 45px rgba(0,0,0,0.7); }
        
        #lyrics-screen { display: none; width: 100%; height: 60vh; overflow-y: auto; text-align: left; }
        .lrc-line { font-size: 24px; font-weight: 700; margin: 25px 0; opacity: 0.2; transition: 0.3s; color: #fff; }
        .lrc-line.active { opacity: 1; color: #e1b1ff; text-shadow: 0 0 15px rgba(225,177,255,0.4); }

        /* Удобный прогресс-бар */
        .progress-area { width: 100%; }
        .progress-bar-container { width: 100%; height: 30px; display: flex; align-items: center; cursor: pointer; }
        .progress-bg { width: 100%; height: 8px; background: rgba(255,255,255,0.1); border-radius: 4px; position: relative; }
        #progress-fill { height: 100%; background: #e1b1ff; width: 0%; border-radius: 4px; box-shadow: 0 0 12px #e1b1ff; }
        .time-labels { display: flex; justify-content: space-between; font-size: 12px; color: #e1b1ff; font-weight: 600; margin-top: 2px; }

        .controls-main { display: flex; justify-content: space-between; align-items: center; width: 100%; margin: 20px 0; }
        .play-circle { background: #fff; width: 70px; height: 70px; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: #000; font-size: 30px; }
        .side-btn { color: #e1b1ff; font-size: 35px; }

        .toggle-lyrics-btn { background: rgba(225,177,255,0.1); border: 2px solid #e1b1ff; color: #e1b1ff; padding: 12px 30px; border-radius: 25px; font-size: 12px; font-weight: 800; }

        /* Мини-плеер */
        .mini-player { position: fixed; bottom: 75px; left: 10px; right: 10px; background: #111; border-radius: 12px; display: flex; align-items: center; padding: 10px 15px; border: 1px solid #222; z-index: 10; }
    </style>
</head>
<body>

    <div id="home" class="screen active">
        <h2>Моя музыка</h2>
        <div class="grid" id="track-list"></div>
    </div>

    <div id="search" class="screen">
        <h2>Поиск</h2>
        <div style="background:#1a1a1a; padding:12px; border-radius:8px; color:#555;">🔍 Артисты, треки...</div>
    </div>

    <div class="mini-player" onclick="openPlayer()">
        <img src="1000061104.jpg" id="mini-cover" style="width:40px; height:40px; border-radius:6px; margin-right:12px; object-fit: cover;">
        <div style="flex-grow:1; overflow:hidden;">
            <b id="mini-title" style="font-size:14px;">Are You Happy?</b><br>
            <small id="mini-artist" style="opacity:0.5">Kai Angel</small>
        </div>
        <div id="mini-play-btn" style="color:#e1b1ff; font-size:20px;">▶</div>
    </div>

    <div id="full-player">
        <div class="header-player">
            <div class="back-btn" onclick="closePlayer()">›</div>
            <div style="font-size:10px; font-weight:800; opacity:0.6; letter-spacing:2px;">COQM PREMIUM</div>
            <div style="font-size:22px;">⋮</div>
        </div>

        <div class="content-area">
            <img src="1000061104.jpg" id="main-cover" class="full-img">
            <div id="lyrics-screen"></div>
        </div>

        <div style="width:100%;">
            <div id="main-title" style="font-size:26px; font-weight:700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;">Are You Happy?</div>
            <div id="main-artist" style="font-size:18px; color:#e1b1ff; margin-top:5px;">Kai Angel</div>
        </div>

        <div class="progress-area">
            <div class="progress-bar-container" id="bar-touch">
                <div class="progress-bg"><div id="progress-fill"></div></div>
            </div>
            <div class="time-labels">
                <span id="time-cur">0:00</span>
                <span id="time-dur">0:00</span>
            </div>
        </div>

        <div class="controls-main">
            <div class="side-btn">🔀</div>
            <div class="side-btn" onclick="prev()">⏮</div>
            <div class="play-circle" id="play-btn-full" onclick="togglePlay()">▶</div>
            <div class="side-btn" onclick="next()">⏭</div>
            <div class="side-btn">🔁</div>
        </div>

        <center><button class="toggle-lyrics-btn" onclick="toggleLyrics()">ТЕКСТ ПЕСНИ</button></center>
    </div>

    <div class="nav">
        <div class="nav-item active" onclick="showScreen('home', this)"><span class="nav-icon">◈</span>Главная</div>
        <div class="nav-item" onclick="showScreen('search', this)"><span class="nav-icon">🔎</span>Поиск</div>
        <div class="nav-item"><span class="nav-icon">📂</span>Медиатека</div>
    </div>

    <audio id="audio"></audio>

    <script>
        const playlist = [
            { title: "Are You Happy?", artist: "Kai Angel", cover: "1000061104.jpg", src: "https://files.catbox.moe/w92z79.mp3", lyrics: [[0,"Are you happy?"]] },
            { title: "Мой драгдилер", artist: "Hanna", cover: "1000061112.jpg", src: "https://files.catbox.moe/hok7ud.mp3", lyrics: [[0,"Hanna Start"]] },
            { title: "Песня 1", artist: "Новый Артист", cover: "1000061104.jpg", src: "https://files.catbox.moe/e6eczs.mp3", lyrics: [] },
            { title: "Песня 2", artist: "Новый Артист", cover: "1000061104.jpg", src: "https://files.catbox.moe/8v7k8t.mp3", lyrics: [] },
            { title: "Песня 3", artist: "Новый Артист", cover: "1000061104.jpg", src: "https://files.catbox.moe/q711k2.mp3", lyrics: [] },
            { title: "Песня 4", artist: "Новый Артист", cover: "1000061104.jpg", src: "https://files.catbox.moe/nlkvvb.mp3", lyrics: [] },
            { title: "Песня 5", artist: "Новый Артист", cover: "1000061104.jpg", src: "https://files.catbox.moe/c7puim.mp3", lyrics: [] },
            { title: "Песня 6", artist: "Новый Артист", cover: "1000061104.jpg", src: "https://files.catbox.moe/gdh9yi.mp3", lyrics: [] },
            { title: "Песня 7", artist: "Новый Артист", cover: "1000061104.jpg", src: "https://files.catbox.moe/4w7wd1.mp3", lyrics: [] },
            { title: "Песня 8", artist: "Новый Артист", cover: "1000061104.jpg", src: "https://files.catbox.moe/gc0vhz.mp3", lyrics: [] },
            { title: "Песня 9", artist: "Новый Артист", cover: "1000061104.jpg", src: "https://files.catbox.moe/bmb2v4.mp3", lyrics: [] },
            { title: "Песня 10", artist: "Новый Артист", cover: "1000061104.jpg", src: "https://files.catbox.moe/lhu1e2.mp3", lyrics: [] },
            { title: "Песня 11", artist: "Новый Артист", cover: "1000061104.jpg", src: "https://files.catbox.moe/rjxfuu.mp3", lyrics: [] }
        ];

        let idx = 0;
        let lrcOpen = false;
        const audio = document.getElementById('audio');

        function initHome() {
            const list = document.getElementById('track-list');
            list.innerHTML = '';
            playlist.forEach((t, i) => {
                const card = document.createElement('div');
                card.className = 'track-card';
                card.onclick = () => { idx = i; load(idx); audio.play(); setIcons('||'); openPlayer(); };
                card.innerHTML = `<img src="${t.cover}"><div>${t.title}</div><div style="opacity:0.5; font-weight:400">${t.artist}</div>`;
                list.appendChild(card);
            });
        }

        function openPlayer() { document.getElementById('full-player').classList.add('open'); }
        function closePlayer() { document.getElementById('full-player').classList.remove('open'); }
        function showScreen(id, el) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            el.classList.add('active');
        }

        function toggleLyrics() {
            lrcOpen = !lrcOpen;
            document.getElementById('main-cover').style.display = lrcOpen ? 'none' : 'block';
            document.getElementById('lyrics-screen').style.display = lrcOpen ? 'block' : 'none';
        }

        function load(i) {
            const t = playlist[i];
            document.getElementById('main-title').innerText = t.title;
            document.getElementById('main-artist').innerText = t.artist;
            document.getElementById('main-cover').src = t.cover;
            document.getElementById('mini-title').innerText = t.title;
            document.getElementById('mini-artist').innerText = t.artist;
            document.getElementById('mini-cover').src = t.cover;
            audio.src = t.src;
            
            const lBox = document.getElementById('lyrics-screen');
            lBox.innerHTML = '';
            (t.lyrics || []).forEach((l, n) => {
                const d = document.createElement('div');
                d.className = 'lrc-line'; d.id = `l-${n}`; d.innerText = l[1];
                lBox.appendChild(d);
            });
        }

        function togglePlay() {
            if(audio.paused) { audio.play(); setIcons('||'); } 
            else { audio.pause(); setIcons('▶'); }
        }

        function setIcons(s) {
            document.getElementById('play-btn-full').innerText = s;
            document.getElementById('mini-play-btn').innerText = s;
        }

        document.getElementById('bar-touch').onclick = (e) => {
            const rect = e.currentTarget.getBoundingClientRect();
            const pct = (e.clientX - rect.left) / rect.width;
            audio.currentTime = pct * audio.duration;
        };

        audio.ontimeupdate = () => {
            if(!audio.duration) return;
            const pct = (audio.currentTime / audio.duration) * 100;
            document.getElementById('progress-fill').style.width = pct + "%";
            document.getElementById('time-cur').innerText = fmt(audio.currentTime);
            document.getElementById('time-dur').innerText = fmt(audio.duration);

            const lines = playlist[idx].lyrics || [];
            lines.forEach((l, i) => {
                if(audio.currentTime >= l[0]) {
                    document.querySelectorAll('.lrc-line').forEach(el => el.classList.remove('active'));
                    const target = document.getElementById(`l-${i}`);
                    if(target) target.classList.add('active');
                }
            });
        };

        function fmt(s) { 
            const m = Math.floor(s/60); 
            const sc = Math.floor(s%60); 
            return `${m}:${sc < 10 ? '0' : ''}${sc}`; 
        }

        function next() { idx = (idx+1)%playlist.length; load(idx); audio.play(); setIcons('||'); }
        function prev() { idx = (idx-1+playlist.length)%playlist.length; load(idx); audio.play(); setIcons('||'); }

        initHome();
        load(0);
    </script>
</body>
</html>

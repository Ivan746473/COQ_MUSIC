<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>COQM MUSIC PREMIUM</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800&display=swap');
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background: #000; color: #fff; font-family: 'Montserrat', sans-serif; margin: 0; height: 100vh; overflow: hidden; }

        /* ОТКЛИК КНОПОК */
        .btn-click:active, .track-card:active { transform: scale(0.92); opacity: 0.8; }
        .btn-click { transition: transform 0.1s ease; cursor: pointer; }

        .screen { display: none; height: 100vh; padding: 20px; padding-bottom: 150px; overflow-y: auto; }
        .screen.active { display: block; }
        
        /* Сетка треков */
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 20px; }
        .track-card { background: #121212; border-radius: 12px; padding: 10px; text-align: left; }
        .track-card img { width: 100%; border-radius: 8px; aspect-ratio: 1/1; object-fit: cover; margin-bottom: 8px; }
        .track-card div { font-size: 13px; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        /* Плеер */
        #full-player { position: fixed; top: 100%; left: 0; width: 100%; height: 100%; background: #000; transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1); z-index: 100; padding: 20px 25px; display: flex; flex-direction: column; }
        #full-player.open { top: 0; }
        
        .content-area { flex-grow: 1; display: flex; align-items: center; justify-content: center; position: relative; }
        .full-img { 
            width: 82vw; height: 82vw; max-width: 330px; 
            border-radius: 50%; object-fit: cover;
            box-shadow: 0 0 40px rgba(255,255,255,0.05);
            animation: rotate 15s linear infinite;
            animation-play-state: paused;
        }
        @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .playing .full-img { animation-play-state: running; }

        /* УПРАВЛЕНИЕ (КРАСИВОЕ И ЖИРНОЕ) */
        .controls-main { display: flex; justify-content: space-between; align-items: center; margin: 35px 0; }
        .play-circle { background: #fff; width: 75px; height: 75px; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: #000; font-size: 32px; font-weight: 900; }
        .side-btn { color: #fff; font-size: 35px; opacity: 0.9; }

        /* ПРОГРЕСС */
        .progress-bg { width: 100%; height: 4px; background: rgba(255,255,255,0.2); border-radius: 2px; margin-top: 10px; }
        #progress-fill { height: 100%; background: #fff; width: 0%; border-radius: 2px; }

        /* МЕНЮ ЭКВАЛАЙЗЕРА */
        #eq-menu { 
            position: absolute; top: 70px; right: 25px; background: #1c1c1c; 
            padding: 20px; border-radius: 15px; display: none; z-index: 110; width: 200px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .eq-row { margin-bottom: 15px; }
        .eq-row label { font-size: 10px; font-weight: 800; display: block; margin-bottom: 5px; opacity: 0.6; }
        input[type=range] { width: 100%; accent-color: #fff; }

        /* МИНИ ПЛЕЕР */
        .mini-player { position: fixed; bottom: 85px; left: 10px; right: 10px; background: #1a1a1a; border-radius: 12px; padding: 10px; display: flex; align-items: center; z-index: 10; }
        .nav { position: fixed; bottom: 0; width: 100%; background: #000; display: flex; justify-content: space-around; padding: 15px 0; border-top: 1px solid #111; }
    </style>
</head>
<body id="app-body">

    <div id="home" class="screen active">
        <h2 style="font-weight: 800; letter-spacing: -1px;">ГЛАВНАЯ</h2>
        <div class="grid" id="track-list"></div>
    </div>

    <div class="mini-player btn-click" onclick="openPlayer()">
        <img src="1000061104.jpg" id="mini-cover" style="width:45px; height:45px; border-radius:8px; margin-right:12px;">
        <div style="flex-grow:1; overflow:hidden;">
            <b id="mini-title" style="font-size:14px;">SIRENS</b><br>
            <small id="mini-artist" style="opacity:0.5">KAI ANGEL</small>
        </div>
        <div id="mini-play-btn" style="font-size:24px; padding-right:10px;">▶</div>
    </div>

    <div id="full-player">
        <div style="display:flex; justify-content:space-between; align-items:center;">
            <div class="btn-click" style="font-size:30px; transform:rotate(90deg);" onclick="closePlayer()">›</div>
            <div style="font-size:10px; font-weight:800; letter-spacing:2px;">COQM MUSIC</div>
            <div class="btn-click" style="font-size:24px;" onclick="toggleEq()">⋮</div>
        </div>

        <div id="eq-menu">
            <div style="font-weight:800; font-size:12px; margin-bottom:15px; text-align:center;">ЭКВАЛАЙЗЕР</div>
            <div class="eq-row"><label>BASS (НИЗКИЕ)</label><input type="range" id="bass" min="-10" max="15" value="0"></div>
            <div class="eq-row"><label>MID (СРЕДНИЕ)</label><input type="range" id="mid" min="-10" max="10" value="0"></div>
            <div class="eq-row"><label>TREBLE (ВЫСОКИЕ)</label><input type="range" id="treble" min="-10" max="15" value="0"></div>
        </div>

        <div class="content-area">
            <img src="1000061104.jpg" id="main-cover" class="full-img">
        </div>

        <div>
            <div id="main-title" style="font-size:26px; font-weight:800; margin-bottom:5px;">SIRENS</div>
            <div id="main-artist" style="font-size:18px; opacity:0.6;">KAI ANGEL</div>
        </div>

        <div class="progress-area" onclick="seek(event)">
            <div class="progress-bg"><div id="progress-fill"></div></div>
            <div style="display:flex; justify-content:space-between; font-size:12px; margin-top:8px; opacity:0.5;">
                <span id="time-cur">0:00</span><span id="time-dur">0:00</span>
            </div>
        </div>

        <div class="controls-main">
            <div class="side-btn btn-click">🔀</div>
            <div class="side-btn btn-click" onclick="prev()">⏮</div>
            <div class="play-circle btn-click" id="play-btn-full" onclick="togglePlay()">▶</div>
            <div class="side-btn btn-click" onclick="next()">⏭</div>
            <div class="side-btn btn-click">🔁</div>
        </div>
    </div>

    <div class="nav">
        <div class="nav-item active btn-click">🏠</div>
        <div class="nav-item btn-click">🔍</div>
        <div class="nav-item btn-click">📚</div>
    </div>

    <audio id="audio" crossorigin="anonymous"></audio>

    <script>
        const playlist = [
            { title: "SIRENS", src: "https://files.catbox.moe/e6eczs.mp3", cover: "1000061104.jpg" },
            { title: "FIRE WALK WITH ME", src: "https://files.catbox.moe/8v7k8t.mp3", cover: "1000061119.jpg" },
            { title: "DESIGNERS PARADISE", src: "https://files.catbox.moe/q711k2.mp3", cover: "1000061120.jpg" },
            { title: "PARASOCIAL FREESTYLE", src: "https://files.catbox.moe/nlkvvb.mp3", cover: "1000061121.jpg" },
            { title: "444", src: "https://files.catbox.moe/c7puim.mp3", cover: "1000061124.jpg" },
            { title: "CHELSEA SMILE", src: "https://files.catbox.moe/gdh9yi.mp3", cover: "1000061125.jpg" },
            { title: "MIRRORS", src: "https://files.catbox.moe/4w7wd1.mp3", cover: "1000061126.jpg" },
            { title: "AMY", src: "https://files.catbox.moe/gc0vhz.mp3", cover: "1000061127.jpg" }
        ];

        let idx = 0;
        const audio = document.getElementById('audio');
        const body = document.getElementById('app-body');
        
        // ЭКВАЛАЙЗЕР ЛОГИКА
        let audioCtx, source, bassNode, midNode, trebleNode;

        function initEq() {
            if (audioCtx) return;
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            source = audioCtx.createMediaElementSource(audio);

            bassNode = audioCtx.createBiquadFilter(); bassNode.type = "lowshelf"; bassNode.frequency.value = 200;
            midNode = audioCtx.createBiquadFilter(); midNode.type = "peaking"; midNode.frequency.value = 1000;
            trebleNode = audioCtx.createBiquadFilter(); trebleNode.type = "highshelf"; trebleNode.frequency.value = 3000;

            source.connect(bassNode).connect(midNode).connect(trebleNode).connect(audioCtx.destination);
        }

        document.getElementById('bass').oninput = e => { if(bassNode) bassNode.gain.value = e.target.value; };
        document.getElementById('mid').oninput = e => { if(midNode) midNode.gain.value = e.target.value; };
        document.getElementById('treble').oninput = e => { if(trebleNode) trebleNode.gain.value = e.target.value; };

        function toggleEq() {
            initEq();
            const menu = document.getElementById('eq-menu');
            menu.style.display = menu.style.display === 'block' ? 'none' : 'block';
        }

        function initHome() {
            const list = document.getElementById('track-list');
            playlist.forEach((t, i) => {
                const card = document.createElement('div');
                card.className = 'track-card';
                card.onclick = () => { idx = i; load(idx); audio.play(); setIcons('❚❚'); body.classList.add('playing'); };
                card.innerHTML = `<img src="${t.cover}"><div>${t.title}</div><div style="opacity:0.4; font-size:11px;">KAI ANGEL</div>`;
                list.appendChild(card);
            });
        }

        function load(i) {
            const t = playlist[i];
            document.getElementById('main-title').innerText = t.title;
            document.getElementById('main-cover').src = t.cover;
            document.getElementById('mini-title').innerText = t.title;
            document.getElementById('mini-cover').src = t.cover;
            audio.src = t.src;
        }

        function togglePlay() {
            initEq(); // Активируем контекст звука при первом клике
            if(audio.paused) { audio.play(); setIcons('❚❚'); body.classList.add('playing'); } 
            else { audio.pause(); setIcons('▶'); body.classList.remove('playing'); }
        }

        function setIcons(s) {
            document.getElementById('play-btn-full').innerText = s;
            document.getElementById('mini-play-btn').innerText = s === '❚❚' ? '❚❚' : '▶';
        }

        audio.onended = () => next();
        function next() { idx = (idx + 1) % playlist.length; load(idx); audio.play(); setIcons('❚❚'); }
        function prev() { idx = (idx - 1 + playlist.length) % playlist.length; load(idx); audio.play(); setIcons('❚❚'); }

        function openPlayer() { document.getElementById('full-player').classList.add('open'); }
        function closePlayer() { document.getElementById('full-player').classList.remove('open'); document.getElementById('eq-menu').style.display = 'none'; }

        audio.ontimeupdate = () => {
            const pct = (audio.currentTime / audio.duration) * 100 || 0;
            document.getElementById('progress-fill').style.width = pct + "%";
            document.getElementById('time-cur').innerText = fmt(audio.currentTime);
            document.getElementById('time-dur').innerText = fmt(audio.duration || 0);
        };

        function seek(e) {
            const rect = document.querySelector('.progress-area').getBoundingClientRect();
            audio.currentTime = ((e.clientX - rect.left) / rect.width) * audio.duration;
        }

        function fmt(s) { 
            const m = Math.floor(s/60); const sc = Math.floor(s%60); 
            return `${m}:${sc < 10 ? '0' : ''}${sc}`; 
        }

        initHome();
        load(0);
    </script>
</body>
</html>

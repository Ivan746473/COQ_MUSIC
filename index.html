<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ivan Music</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            background-color: #121212;
            color: white;
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .header { font-size: 24px; font-weight: bold; margin-bottom: 20px; color: #1DB954; }
        .player-card {
            background: #181818;
            width: 100%;
            border-radius: 12px;
            padding: 15px;
            box-sizing: border-box;
            text-align: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
        .track-img { width: 150px; height: 150px; border-radius: 8px; background: #282828; margin-bottom: 15px; }
        .track-name { font-size: 18px; margin-bottom: 5px; }
        .artist { color: #b3b3b3; font-size: 14px; margin-bottom: 20px; }
        audio { width: 100%; filter: invert(100%) hue-rotate(180deg) brightness(1.5); }
        .btn {
            background: #1DB954;
            color: black;
            border: none;
            padding: 12px 25px;
            border-radius: 25px;
            font-weight: bold;
            margin-top: 20px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="header">Ivan Music</div>
    
    <div class="player-card">
        <div class="track-img">
            <img src="https://via.placeholder.com/150" id="cover" style="width:100%; border-radius:8px;">
        </div>
        <div class="track-name" id="title">Твой первый трек</div>
        <div class="artist" id="artist">Исполнитель</div>
        
        <audio id="audio-player" controls>
            <source src="ССЫЛКА_НА_ТВОЙ_ФАЙЛ.mp3" type="audio/mpeg">
        </audio>
    </div>

    <button class="btn" onclick="tgClose()">Закрыть плеер</button>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand(); // Раскрывает окно на весь экран

        function tgClose() {
            tg.close();
        }
    </script>
</body>
</html>

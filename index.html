<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>COQM MUSIC VINYL PRO</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap');
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background: #000; color: #fff; font-family: 'Montserrat', sans-serif; margin: 0; height: 100vh; overflow: hidden; }

        .btn-click:active { transform: scale(0.85); opacity: 0.6; }
        .track-card:active { transform: scale(0.96); background: #222; }
        .btn-click, .track-card { transition: all 0.1s ease; cursor: pointer; }

        .screen { display: none; height: 100vh; padding: 20px; padding-bottom: 160px; overflow-y: auto; }
        .screen.active { display: block; }
        
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 20px; }
        .track-card { background: #111; border-radius: 12px; padding: 12px; border: 1px solid #222; }
        .track-card img { width: 100%; border-radius: 8px; aspect-ratio: 1/1; object-fit: cover; margin-bottom: 10px; }
        .track-card div { font-size: 12px; font-weight: 900; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; text-transform: uppercase; }

        #full-player { position: fixed; top: 100%; left: 0; width: 100%; height: 100%; background: #000; transition: 0.4s cubic-bezier(0.1, 0.7, 0.1, 1); z-index: 100; padding: 30px; display: flex; flex-direction: column; }
        #full-player.open { top: 0; }
        
        .playback-zone { 
            position: relative; width: 85vw; height: 85vw; max-width: 340px; 
            margin: 0 auto;
            display: flex; align-items: center; justify-content: center;
        }

        .vinyl-wrapper {
            position: relative; width: 100%; height: 100%;
            background: url('vinyl_disc.png') no-repeat center center;
            background-size: cover;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            animation: rotate 12s linear infinite;
            animation-play-state: paused;
        }
        .playing .vinyl-wrapper { animation-play-state: running; }

        .vinyl-cover { 
            width: 42%; height: 42%; border-radius: 50%; 
            object-fit: cover; border: 3px solid #000; 
        }

        .vinyl-arm {
            position: absolute; top: -5%; right: -10%; 
            width: 50%; height: auto; 
            transform-origin: top right;
            transform: rotate(20deg);
            transition: transform 0.8s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 5;
            pointer-events: none;
        }
        .playing .vinyl-arm { transform: rotate(2deg); }

        @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        .controls-main { display: flex; justify-content: space-between; align-items: center; margin: 40px 0; }
        .play-circle { background: #fff; width: 80px; height: 80px; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: #000; font-size: 35px; }
        .side-btn { color: #fff; font-size: 30px; }

        .progress-bg { width: 100%; height: 6px; background: #333; border-radius: 10px; margin-top: 15px; overflow: hidden; }
        #progress-fill { height: 100%; background: #fff; width: 0%; }

        .mini-player { position: fixed; bottom: 85px; left: 15px; right: 15px; background: #111; border-radius: 15px; padding: 12px; display: flex; align-items: center; z-index: 10; border: 1px solid #222; }
        .nav { position: fixed; bottom: 0; width: 100%; background: #000; display: flex; justify-content: space-around; padding: 20px 0; border-top: 1px solid #111; }
    </style>
</head>
<body id="app-body">

    <div id="home" class="screen active">
        <h1 style="font-weight: 900; text-align: center; letter-spacing: -2px; margin-top: 30px;">COQM MUSIC</h1>
        <div class="grid" id="track-list"></div>
    </div>

    <div class="mini-player btn-click" onclick="openPlayer()">
        <img src="1000061091.png" style="width:50px; height:50px; border-radius:50%; margin-right:15px; object-fit: cover;">
        <div style="flex-grow:1; overflow:hidden;">
            <b id="mini-title" style="font-size:14px; text-transform: uppercase;">SIRENS</b><br>
            <small id="mini-artist" style="opacity:0.5; font-size:12px;">KAI ANGEL</small>
        </div>
        <div id="mini-play-btn" style="font-size:24px; font-weight: 900;">▶</div>
    </div>

    <div id="full-player">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom: 20px;">
            <div class="btn-click" style="font-size:35px; transform:rotate(90deg);" onclick="closePlayer()">›</div>
            <div style="font-size:11px; font-weight:900; letter-spacing:4px; opacity:0.4;">VINYL MODE</div>
            <div style="width: 30px;"></div>
        </div>

        <div class="playback-zone">
            <div class="vinyl-wrapper">
                <img src="1000061091.png" class="vinyl-cover">
            </div>
            <img src="vinyl_arm.png" class="vinyl-arm">
        </div>

        <div style="text-align: center; margin-top: 40px;">
            <div id="main-title" style="font-size:28px; font-weight:900; text-transform: uppercase;">SIRENS</div>
            <div id="main-artist" style="font-size:18px; opacity:0.4; margin-top:5px;">KAI ANGEL</div>
        </div>

        <div class="progress-bg" onclick="seek(event)"><div id="progress-fill"></div></div>
        <div style="display:flex; justify-content:space-between; font-size:12px; margin-top:10px; opacity:0.3;">
            <span id="time-cur">0:00</span><span id="time-dur">0:00</span>
        </div>

        <div class="controls-main">
            <div class="side-btn btn-click">🔀</div>
            <div class="side-btn btn-click" onclick="prev()">⏮</div>
            <div class="play-circle btn-click" id="play-btn-full" onclick="togglePlay()">▶</div>
            <div class="side-btn btn-click" onclick="next()">⏭</div>
            <div class="side-btn btn-click">🔁</div>
        </div>
    </div>

    <div class="nav">
        <div class="nav-item btn-click">🏠</div>
        <div class="nav-item btn-click">🔍</div>
        <div class="nav-item btn-click">📂</div>
    </div>

    <audio id="audio" crossorigin="anonymous"></audio>

    <script>
        const playlist = [
            { title: "SIRENS", src: "https://files.catbox.moe/e6eczs.mp3" },
            { title: "FIRE WALK WITH ME", src: "https://files.catbox.moe/8v7k8t.mp3" },
            { title: "DESIGNERS PARADISE", src: "https://files.catbox.moe/q711k2.mp3" },
            { title: "PARASOCIAL FREESTYLE", src: "https://files.catbox.moe/nlkvvb.mp3" },
            { title: "444", src: "https://files.catbox.moe/c7puim.mp3" },
            { title: "CHELSEA SMILE", src: "https://files.catbox.moe/gdh9yi.mp3" },
            { title: "MIRRORS", src: "https://files.catbox.moe/4w7wd1.mp3" },
            { title: "AMY", src: "https://files.catbox.moe/gc0vhz.mp3" },
            { title: "I'M ALL BLESSED", src: "https://files.catbox.moe/bmb2v4.mp3" },
            { title: "WELCOME TO FOREVER", src: "https://files.catbox.moe/bmb2v4.mp3" },
            { title: "MADAM", src: "https://files.catbox.moe/lhu1e2.mp3" },
            { title: "BASEMENT", src: "https://files.catbox.moe/rjxfuu.mp3" }
        ];

        let idx = 0;
        const audio = document.getElementById('audio');
        const body = document.getElementById('app-body');

        function initHome() {
            const list = document.getElementById('track-list');
            playlist.forEach((t, i) => {
                const card = document.createElement('div');
                card.className = 'track-card';
                card.onclick = () => { idx = i; load(idx); audio.play(); setIcons('❚❚'); body.classList.add('playing'); openPlayer(); };
                card.innerHTML = `<img src="1000061091.png"><div>${t.title}</div><div style="opacity:0.4; font-size:10px;">KAI ANGEL</div>`;
                list.appendChild(card);
            });
        }

        function load(i) {
            const t = playlist[i];
            document.getElementById('main-title').innerText = t.title;
            document.getElementById('mini-title').innerText = t.title;
            audio.src = t.src;
        }

        function togglePlay() {
            if(audio.paused) { audio.play(); setIcons('❚❚'); body.classList.add('playing'); } 
            else { audio.pause(); setIcons('▶'); body.classList.remove('playing'); }
        }

        function setIcons(s) {
            document.getElementById('play-btn-full').innerText = s;
            document.getElementById('mini-play-btn').innerText = s === '❚❚' ? '❚❚' : '▶';
        }

        audio.onended = () => next();
        function next() { idx = (idx + 1) % playlist.length; load(idx); audio.play(); setIcons('❚❚'); body.classList.add('playing'); }
        function prev() { idx = (idx - 1 + playlist.length) % playlist.length; load(idx); audio.play(); setIcons('❚❚'); body.classList.add('playing'); }

        function openPlayer() { document.getElementById('full-player').classList.add('open'); }
        function closePlayer() { document.getElementById('full-player').classList.remove('open'); }

        audio.ontimeupdate = () => {
            const pct = (audio.currentTime / audio.duration) * 100 || 0;
            document.getElementById('progress-fill').style.width = pct + "%";
            document.getElementById('time-cur').innerText = fmt(audio.currentTime);
            document.getElementById('time-dur').innerText = fmt(audio.duration || 0);
        };

        function seek(e) {
            const rect = document.querySelector('.progress-bg').getBoundingClientRect();
            audio.currentTime = ((e.clientX - rect.left) / rect.width) * audio.duration;
        }

        function fmt(s) { 
            const m = Math.floor(s/60); const sc = Math.floor(s%60); 
            return `${m}:${sc < 10 ? '0' : ''}${sc}`; 
        }

        initHome();
        load(0);
    </script>
</body>
</html>

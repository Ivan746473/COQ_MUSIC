<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kai Angel - Are You Happy? | CM MUSIC</title>
    <style>
        body { background: linear-gradient(180deg, #1a0b1a 0%, #000000 100%); color: #fff0f5; font-family: sans-serif; padding: 20px; text-align: center; min-height: 100vh; margin: 0; display: flex; flex-direction: column; align-items: center; }
        .header { font-size: 16px; font-weight: bold; color: #e1b1ff; margin-bottom: 30px; text-shadow: 0 0 15px rgba(225, 177, 255, 0.4); letter-spacing: 4px; text-transform: uppercase; }
        .track-img { width: 280px; height: 280px; border-radius: 20px; object-fit: cover; border: 1px solid #4a2d4d; margin-bottom: 20px; box-shadow: 0 0 40px rgba(160, 100, 200, 0.2); }
        .track-info { margin-bottom: 25px; }
        .track-title { font-weight: bold; font-size: 24px; color: #e1b1ff; margin-bottom: 5px; }
        .track-artist { opacity: 0.5; font-size: 16px; letter-spacing: 1px; }

        .lyrics-container { height: 250px; overflow-y: hidden; width: 100%; max-width: 400px; margin-bottom: 30px; position: relative; mask-image: linear-gradient(transparent, black 30%, black 70%, transparent); }
        .lyrics-content { transition: transform 0.5s ease-in-out; }
        .lyrics-line { opacity: 0.15; transition: 0.4s; color: #d8bfd8; font-size: 18px; margin: 20px 0; padding: 0 10px; }
        .lyrics-line.active { opacity: 1; color: #e1b1ff; transform: scale(1.1); font-weight: bold; text-shadow: 0 0 10px rgba(225, 177, 255, 0.5); }

        audio { width: 100%; max-width: 320px; filter: invert(80%) sepia(50%) saturate(1000%) hue-rotate(240deg); border-radius: 30px; }
    </style>
</head>
<body>
    <div class="header">CM MUSIC PLAYER</div>
    
    <img src="https://files.catbox.moe/p9pghz.jpg" class="track-img">
    
    <div class="track-info">
        <div class="track-title">Are You Happy?</div>
        <div class="track-artist">Kai Angel</div>
    </div>

    <div class="lyrics-container">
        <div class="lyrics-content" id="lyrics-content"></div>
    </div>

    <audio id="audio-player" controls src="https://files.catbox.moe/w92z79.mp3"></audio>

    <script>
        const audio = document.getElementById('audio-player');
        const content = document.getElementById('lyrics-content');

        const lyrics = [
            [1, "Are you happy? (Are you happy?)"], [6, "‘Cause you look sad"], [10, "Like a church with no choir"], [15, "Like a God gone mad"], [19, "Like a God gone mad on the edge of the night"], [32, "I don’t see your smile"], [36, "Your voice just doesn’t land"], [40, "I’m familiar with your desire"], [43, "And it’s very different than what’s in your hands"], [49, "Hold me like a secret"], [53, "But scream in my ear"], [55, "Tell me you love me"], [59, "Then disappear"], [61, "I don’t want the truth"], [63, "I just want a touch"], [65, "Bleed me slow"], [67, "But don’t ask for it too much"], [76, "Bleed me slow, wow"], [81, "Окей, держи меня в секрете"], [83, "И не рассказывай никому в интернете"], [85, "Ты в моих снах буквально каждый день"], [87, "I still see your eyes through the rain"], [90, "I still feel your scent like a subtle stain"], [93, "You leave ghosts in midnight air"], [95, "It’s still on my mind how you"], [97, "Hold me like a secret"], [100, "But scream in my ear"], [103, "Tell me you love me"], [107, "Then disappear"], [109, "I don’t want the truth"], [112, "I just want a touch"], [113, "Bleed me slow"], [116, "But don’t ask for it too much"], [120, "Baby, I love every surgery you did"], [124, "If I was a knife, I would stab somewhere in between"], [129, "Maybe I’m not the one to hold you like this"], [134, "But you"], [135, "Hold me like a secret"], [139, "You scream in my ear"], [141, "Tell me you love me (Do you love me?)"], [145, "Then disappear"], [148, "I don’t want the truth"], [150, "I just want a touch"], [154, "But don’t ask for it too much"], [168, "But scream in my ear"], [170, "Tell me you love me"], [174, "Then disappear"], [176, "I don’t want the truth"], [179, "I just want a touch"], [181, "Bleed me slow"], [183, "But don’t ask for it too much"]
        ];

        // Отрисовка текста
        lyrics.forEach((line, i) => {
            const div = document.createElement('div');
            div.className = 'lyrics-line';
            div.id = `line-${i}`;
            div.innerText = line[1];
            content.appendChild(div);
        });

        // Слежение за временем
        audio.ontimeupdate = () => {
            const currentTime = audio.currentTime;
            
            for (let i = 0; i < lyrics.length; i++) {
                if (currentTime >= lyrics[i][0] && (!lyrics[i+1] || currentTime < lyrics[i+1][0])) {
                    updateLyrics(i);
                    break;
                }
            }
        };

        function updateLyrics(index) {
            const lines = document.querySelectorAll('.lyrics-line');
            lines.forEach(line => line.classList.remove('active'));
            
            const activeLine = document.getElementById(`line-${index}`);
            if (activeLine) {
                activeLine.classList.add('active');
                // Плавная прокрутка: считаем отступ
                const offset = index * 58; // 58 - примерная высота строки с отступами
                content.style.transform = `translateY(-${offset}px)`;
            }
        }
    </script>
</body>
</html>

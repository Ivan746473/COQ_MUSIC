<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>COQM MUSIC PURE</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap');
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background: #000; color: #fff; font-family: 'Montserrat', sans-serif; margin: 0; height: 100vh; overflow: hidden; }

        .btn-click:active { transform: scale(0.9); opacity: 0.8; }

        #full-player { position: fixed; top: 100%; left: 0; width: 100%; height: 100%; background: #000; transition: 0.5s cubic-bezier(0.1, 0.7, 0.1, 1); z-index: 100; padding: 30px; display: flex; flex-direction: column; align-items: center; }
        #full-player.open { top: 0; }

        /* ВИНИЛ ЦЕЛИКОМ НА CSS (БЕЗ КАРТИНОК ФОНА) */
        .vinyl-container {
            position: relative;
            width: 80vw; height: 80vw; max-width: 300px;
            margin-top: 50px;
            display: flex; align-items: center; justify-content: center;
        }

        .vinyl-disc {
            width: 100%; height: 100%;
            border-radius: 50%;
            /* Рисуем дорожки винила градиентом */
            background: radial-gradient(circle, #333 0%, #111 2%, #111 10%, #050505 15%, #111 20%, #050505 25%, #111 30%, #050505 35%, #111 40%, #050505 45%, #111 50%, #050505 55%, #111 60%, #050505 65%, #111 70%, #050505 75%, #111 80%, #050505 85%, #111 90%, #050505 100%);
            box-shadow: 0 0 40px rgba(0,0,0,1), inset 0 0 10px rgba(255,255,255,0.1);
            display: flex; align-items: center; justify-content: center;
            animation: rotate 10s linear infinite;
            animation-play-state: paused;
        }
        .playing .vinyl-disc { animation-play-state: running; }

        .vinyl-center-logo {
            width: 35%; height: 35%;
            border-radius: 50%;
            border: 4px solid #000;
            object-fit: cover;
            background: #222;
        }

        /* ИГЛА (ТОНАРМ) НА CSS */
        .tonearm {
            position: absolute;
            top: -20px; right: 10px;
            width: 120px; height: 10px;
            background: linear-gradient(to bottom, #888, #444);
            border-radius: 5px;
            transform-origin: right center;
            transform: rotate(30deg);
            transition: transform 0.8s ease;
            z-index: 10;
        }
        .tonearm::before { /* Держатель */
            content: ''; position: absolute; right: -10px; top: -10px;
            width: 30px; height: 30px; background: #222; border-radius: 50%;
        }
        .tonearm::after { /* Сама игла */
            content: ''; position: absolute; left: 0; top: 5px;
            width: 20px; height: 15px; background: #666; border-radius: 2px;
        }
        .playing .tonearm { transform: rotate(0deg); }

        @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        /* ОСТАЛЬНОЙ ИНТЕРФЕЙС */
        .info { text-align: center; margin-top: 30px; }
        .info h2 { font-weight: 900; margin: 0; text-transform: uppercase; }
        .info p { opacity: 0.4; margin: 5px 0; }

        .progress { width: 100%; height: 4px; background: #222; margin-top: 30px; position: relative; border-radius: 2px; }
        #bar { position: absolute; height: 100%; background: #fff; width: 0%; border-radius: 2px; }

        .controls { display: flex; width: 100%; justify-content: space-around; align-items: center; margin-top: 40px; }
        .play-btn { background: #fff; color: #000; width: 70px; height: 70px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 30px; }

        /* СПИСОК */
        .home { padding: 20px; display: block; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 20px; }
        .card { background: #0a0a0a; padding: 10px; border-radius: 15px; border: 1px solid #1a1a1a; text-align: center; font-size: 12px; }
        .card img { width: 100%; border-radius: 10px; margin-bottom: 8px; }

        .mini { position: fixed; bottom: 20px; left: 15px; right: 15px; background: #111; padding: 12px; border-radius: 20px; display: flex; align-items: center; border: 1px solid #222; }
    </style>
</head>
<body id="app">

    <div class="home">

        <div class="grid" id="list"></div>
    </div>

    <div class="mini btn-click" onclick="openP()">
        <img src="1000061091.png" style="width:40px; height:40px; border-radius:50%; margin-right:12px; object-fit: cover;">
        <div style="flex:1"><b id="min-t">SIRENS</b></div>
        <div id="min-b">▶</div>
    </div>

    <div id="full-player">
        <div onclick="closeP()" style="align-self: flex-start; font-size: 35px; opacity: 0.3;">✕</div>
        
        <div class="vinyl-container">
            <div class="tonearm"></div>
            <div class="vinyl-disc">
                <img src="1000061091.png" class="vinyl-center-logo">
            </div>

        <div class="info">
            <h2 id="f-t">SIRENS</h2>

        <div class="progress"><div id="bar"></div></div>

            <div class="btn-click" onclick="next()" style="font-size:30px">⏭</div>

<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kai Angel - CM Music</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { background: linear-gradient(180deg, #2b1a1d 0%, #121212 100%); color: #fff0f5; font-family: sans-serif; padding: 20px; text-align: center; min-height: 100vh; margin: 0; }
        .header { font-size: 24px; font-weight: bold; color: #ffb6c1; margin-bottom: 20px; text-shadow: 0 0 10px rgba(255, 182, 193, 0.5); }
        .track-img { width: 220px; height: 220px; border-radius: 20px; object-fit: cover; border: 2px solid #ffb6c1; margin-bottom: 10px; box-shadow: 0 0 20px rgba(255,182,193,0.3); }
        .lyrics-container { height: 200px; overflow-y: hidden; margin: 20px 0; font-size: 18px; line-height: 2; mask-image: linear-gradient(transparent, black 20%, black 80%, transparent); }
        .lyrics-line { opacity: 0.2; transition: 0.3s; color: #ffd1dc; }
        .lyrics-line.active { opacity: 1; color: #ffb6c1; transform: scale(1.1); font-weight: bold; }
        audio { width: 100%; filter: invert(30%) sepia(100%) saturate(200%) hue-rotate(300deg); margin-top: 10px; }
        .dev-panel { background: rgba(255,192,203,0.05); padding: 15px; border-radius: 15px; border: 1px dashed #ffb6c1; margin-top: 30px; font-size: 12px; }
        button { background: #ffb6c1; color: #4a1e25; border: none; padding: 10px 15px; border-radius: 10px; font-weight: bold; cursor: pointer; margin: 5px; }
        #log { background: #000; color: #ffb6c1; font-family: monospace; font-size: 10px; padding: 10px; text-align: left; margin-top: 10px; white-space: pre-wrap; display: none; border: 1px solid #ffb6c1; }
    </style>
</head>
<body>
    <div class="header">CM Music</div>
    <img src="https://i.scdn.co/image/ab67616d0000b27376c9c6f2a688b776269c3a3b" class="track-img">
    <div style="font-weight: bold; font-size: 20px;">Are You Happy?</div>
    <div style="opacity: 0.6; font-size: 14px; margin-bottom: 10px;">Kai Angel</div>

    <div class="lyrics-container" id="lrc-list"></div>
    <audio id="audio-player" controls></audio>

    <div class="dev-panel">
        <p>СЛУШАЙ И ЖМИ МЕТКУ ПОД СЛОВА:</p>
        <button onclick="markTime()">🎵 МЕТКА ВРЕМЕНИ</button>
        <button onclick="showResult()">ПОЛУЧИТЬ ТАЙМИНГИ</button>
        <div id="log"></div>
    </div>

    <script>
        const audio = document.getElementById('audio-player');
        const lrcList = document.getElementById('lrc-list');
        const log = document.getElementById('log');

        // Текст песни Kai Angel - Are you happy
        const rawLyrics = [
            "Are you happy?",
            "Viperr...",
            "Kai Angel...",
            "Я делаю это, пока они смотрят",
            "Мой стиль — это яд, они все его хотят",
            "Are you happy?",
            "Я на вершине, и мне не страшно",
            "Всё, что было раньше, уже не важно",
            "Смотри мне в глаза...",
            "Are you happy now?",
            "Viperr on the top"
        ];

        let syncData = [];
        let currentLine = 0;

        // ВСТАВЬ ССЫЛКУ ОТ CATBOX СЮДА
        audio.src = "https://files.catbox.moe/w92z79.mp3";

        rawLyrics.forEach((text, i) => {
            const div = document.createElement('div');
            div.className = 'lyrics-line';
            div.id = `line-${i}`;
            div.innerText = text;
            lrcList.appendChild(div);
        });

        function markTime() {
            const time = Math.floor(audio.currentTime);
            if (currentLine < rawLyrics.length) {
                syncData.push(`[${time}, "${rawLyrics[currentLine]}"]`);
                document.querySelectorAll('.lyrics-line').forEach(el => el.classList.remove('active'));
                document.getElementById(`line-${currentLine}`).classList.add('active');
                currentLine++;
            }
        }

        function showResult() {
            log.style.display = 'block';
            log.innerText = "Замени блок lyrics этим:\n\nlyrics: [\n  " + syncData.join(",\n  ") + "\n]";
        }
    </script>
</body>
</html>

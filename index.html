<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>COQM MUSIC</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800&display=swap');
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background: #000; color: #fff; font-family: 'Montserrat', sans-serif; margin: 0; height: 100vh; overflow: hidden; }

        .screen { display: none; height: 100vh; padding: 20px; padding-bottom: 150px; overflow-y: auto; }
        .screen.active { display: block; }
        h2 { font-size: 22px; margin-top: 40px; color: #fff; font-weight: 800; letter-spacing: -0.5px; }

        /* Сетка треков */
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 20px; }
        .track-card { background: #121212; border-radius: 8px; padding: 12px; transition: 0.2s; }
        .track-card img { width: 100%; border-radius: 4px; aspect-ratio: 1/1; object-fit: cover; margin-bottom: 8px; }
        .track-card div { font-size: 13px; font-weight: 700; color: #fff; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        /* Плеер */
        #full-player { position: fixed; top: 100%; left: 0; width: 100%; height: 100%; background: #121212; transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1); z-index: 100; padding: 20px 25px; display: flex; flex-direction: column; }
        #full-player.open { top: 0; }
        .back-btn { font-size: 30px; cursor: pointer; transform: rotate(90deg); }

        /* АНИМАЦИЯ ВРАЩЕНИЯ */
        .content-area { flex-grow: 1; display: flex; align-items: center; justify-content: center; }
        .full-img { 
            width: 80vw; height: 80vw; max-width: 320px; 
            border-radius: 50%; /* Делаем круглой как пластинку */
            object-fit: cover; 
            box-shadow: 0 0 0 10px #1a1a1a, 0 20px 60px rgba(0,0,0,0.8); 
            transition: transform 0.3s ease;
            animation: rotate 10s linear infinite;
            animation-play-state: paused; /* По умолчанию стоит */
        }
        
        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .playing .full-img { animation-play-state: running; }

        /* Прогресс-бар */
        .progress-area { width: 100%; margin-top: 20px; }
        .progress-bar-container { width: 100%; height: 30px; display: flex; align-items: center; cursor: pointer; }
        .progress-bg { width: 100%; height: 6px; background: rgba(255,255,255,0.1); border-radius: 3px; position: relative; }
        #progress-fill { height: 100%; background: #fff; width: 0%; border-radius: 3px; }
        .time-labels { display: flex; justify-content: space-between; font-size: 12px; color: #b3b3b3; margin-top: 4px; }

        /* Кнопки управления */
        .controls-main { display: flex; justify-content: space-between; align-items: center; margin: 30px 0; }
        .play-circle { background: #fff; width: 65px; height: 65px; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: #000; font-size: 28px; }
        .side-btn { color: #fff; font-size: 32px; }

        /* Мини-плеер и Навигация */
        .mini-player { position: fixed; bottom: 75px; left: 8px; right: 8px; background: #282828; border-radius: 8px; display: flex; align-items: center; padding: 8px 12px; z-index: 10; }
        .nav { position: fixed; bottom: 0; width: 100%; background: rgba(0,0,0,0.95); display: flex; justify-content: space-around; padding: 12px 0; border-top: 1px solid #1a1a1a; z-index: 50; }
        .nav-item { text-align: center; color: #b3b3b3; font-size: 10px; font-weight: 600; cursor: pointer; }
        .nav-item.active { color: #fff; }
    </style>
</head>
<body id="app-body">

    <div id="home" class="screen active">
        <h2>СЛУШАЕМ ДАЛЬШЕ?</h2>
        <div class="grid" id="track-list"></div>
    </div>

    <div id="search" class="screen">
        <h2>ПОИСК</h2>
        <input type="text" placeholder="Что хочешь послушать?" style="width:100%; padding:15px; border-radius:8px; border:none; background:#282828; color:#fff; font-family:inherit;">
    </div>

    <div class="mini-player" onclick="openPlayer()">
        <img src="1000061104.jpg" id="mini-cover" style="width:40px; height:40px; border-radius:4px; margin-right:12px; object-fit: cover;">
        <div style="flex-grow:1; overflow:hidden;">
            <b id="mini-title" style="font-size:13px; display:block; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;">SIRENS</b><br>
            <small id="mini-artist" style="opacity:0.6; font-size:11px;">KAI ANGEL</small>
        </div>
        <div id="mini-play-btn" style="font-size:22px; margin-left:10px;">▶</div>
    </div>

    <div id="full-player">
        <div style="display:flex; justify-content:space-between; align-items:center;">
            <div class="back-btn" onclick="closePlayer()">›</div>
            <div style="font-size:11px; font-weight:700; letter-spacing:1px; opacity:0.8;">COQM MUSIC</div>
            <div style="font-size:20px;">⋮</div>
        </div>

        <div class="content-area">
            <img src="1000061104.jpg" id="main-cover" class="full-img">
        </div>

        <div style="margin-top:20px;">
            <div id="main-title" style="font-size:24px; font-weight:800;">SIRENS</div>
            <div id="main-artist" style="font-size:16px; color:#b3b3b3; margin-top:4px;">KAI ANGEL</div>
        </div>

        <div class="progress-area">
            <div class="progress-bar-container" id="bar-touch">
                <div class="progress-bg"><div id="progress-fill"></div></div>
            </div>
            <div class="time-labels">
                <span id="time-cur">0:00</span>
                <span id="time-dur">0:00</span>
            </div>
        </div>

        <div class="controls-main">
            <div class="side-btn">🔀</div>
            <div class="side-btn" onclick="prev()">⏮</div>
            <div class="play-circle" id="play-btn-full" onclick="togglePlay()">▶</div>
            <div class="side-btn" onclick="next()">⏭</div>
            <div class="side-btn">🔁</div>
        </div>
    </div>

    <div class="nav">
        <div class="nav-item active" onclick="showScreen('home', this)">🏠<br>Главная</div>
        <div class="nav-item" onclick="showScreen('search', this)">🔍<br>Поиск</div>
        <div class="nav-item">📚<br>Медиатека</div>
    </div>

    <audio id="audio"></audio>

    <script>
        const playlist = [
            { title: "SIRENS", artist: "KAI ANGEL", cover: "1000061104.jpg", src: "https://files.catbox.moe/e6eczs.mp3" },
            { title: "FIRE WALK WITH ME", artist: "KAI ANGEL", cover: "1000061104.jpg", src: "https://files.catbox.moe/8v7k8t.mp3" },
            { title: "DESIGNERS PARADISE", artist: "KAI ANGEL", cover: "1000061104.jpg", src: "https://files.catbox.moe/q711k2.mp3" },
            { title: "PARASOCIAL FREESTYLE", artist: "KAI ANGEL", cover: "1000061104.jpg", src: "https://files.catbox.moe/nlkvvb.mp3" },
            { title: "444", artist: "KAI ANGEL", cover: "1000061104.jpg", src: "https://files.catbox.moe/c7puim.mp3" },
            { title: "CHELSEA SMILE", artist: "KAI ANGEL", cover: "1000061104.jpg", src: "https://files.catbox.moe/gdh9yi.mp3" },
            { title: "MIRRORS", artist: "KAI ANGEL", cover: "1000061104.jpg", src: "https://files.catbox.moe/4w7wd1.mp3" },
            { title: "AMY", artist: "KAI ANGEL", cover: "1000061104.jpg", src: "https://files.catbox.moe/gc0vhz.mp3" },
            { title: "IM ALL BLESSED THE FUCK UP", artist: "KAI ANGEL", cover: "1000061104.jpg", src: "https://files.catbox.moe/bmb2v4.mp3" },
            { title: "WELCOME TO FOREVER", artist: "KAI ANGEL", cover: "1000061104.jpg", src: "https://files.catbox.moe/bmb2v4.mp3" },
            { title: "MADAM", artist: "KAI ANGEL", cover: "1000061104.jpg", src: "https://files.catbox.moe/lhu1e2.mp3" },
            { title: "BASEMENT", artist: "KAI ANGEL", cover: "1000061104.jpg", src: "https://files.catbox.moe/rjxfuu.mp3" }
        ];

        let idx = 0;
        const audio = document.getElementById('audio');
        const body = document.getElementById('app-body');

        function initHome() {
            const list = document.getElementById('track-list');
            list.innerHTML = '';
            playlist.forEach((t, i) => {
                const card = document.createElement('div');
                card.className = 'track-card';
                card.onclick = () => { idx = i; load(idx); audio.play(); setIcons('||'); body.classList.add('playing'); };
                card.innerHTML = `<img src="${t.cover}"><div>${t.title}</div><div style="opacity:0.5">${t.artist}</div>`;
                list.appendChild(card);
            });
        }

        function load(i) {
            const t = playlist[i];
            document.getElementById('main-title').innerText = t.title;
            document.getElementById('main-artist').innerText = t.artist;
            document.getElementById('main-cover').src = t.cover;
            document.getElementById('mini-title').innerText = t.title;
            document.getElementById('mini-artist').innerText = t.artist;
            document.getElementById('mini-cover').src = t.cover;
            audio.src = t.src;
        }

        function togglePlay() {
            if(audio.paused) { 
                audio.play(); setIcons('||'); 
                body.classList.add('playing');
            } else { 
                audio.pause(); setIcons('▶'); 
                body.classList.remove('playing');
            }
        }

        function setIcons(s) {
            document.getElementById('play-btn-full').innerText = s;
            document.getElementById('mini-play-btn').innerText = s;
        }

        audio.onended = () => { next(); };
        function next() { idx = (idx + 1) % playlist.length; load(idx); audio.play(); setIcons('||'); body.classList.add('playing'); }
        function prev() { idx = (idx - 1 + playlist.length) % playlist.length; load(idx); audio.play(); setIcons('||'); body.classList.add('playing'); }

        function openPlayer() { document.getElementById('full-player').classList.add('open'); }
        function closePlayer() { document.getElementById('full-player').classList.remove('open'); }
        function showScreen(id, el) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            el.classList.add('active');
        }

        document.getElementById('bar-touch').onclick = (e) => {
            const rect = e.currentTarget.getBoundingClientRect();
            const pct = (e.clientX - rect.left) / rect.width;
            audio.currentTime = pct * audio.duration;
        };

        audio.ontimeupdate = () => {
            if(!audio.duration) return;
            const pct = (audio.currentTime / audio.duration) * 100;
            document.getElementById('progress-fill').style.width = pct + "%";
            document.getElementById('time-cur').innerText = fmt(audio.currentTime);
            document.getElementById('time-dur').innerText = fmt(audio.duration);
        };

        function fmt(s) { 
            const m = Math.floor(s/60); 
            const sc = Math.floor(s%60); 
            return `${m}:${sc < 10 ? '0' : ''}${sc}`; 
        }

        initHome();
        load(0);
    </script>
</body>
</html>
